<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathSwipe — Brain Challenge</title>
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-bg: #161920;
            --text-color: #ffffff;
            --text-muted: #9ba3af;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 90%;
            margin: 40px auto;
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .logo span {
            color: var(--accent-blue);
        }

        .tagline {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #232733;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: block;
            padding: 14px 20px;
            background-color: #1f2430;
            color: var(--text-color);
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: 1px solid #2d3345;
        }

        .link-btn:hover {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        .link-btn.delete {
            border-color: rgba(239, 68, 68, 0.3);
        }

        .link-btn.delete:hover {
            background-color: var(--accent-red);
            border-color: var(--accent-red);
        }

        footer {
            margin-top: auto;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Math<span>Swipe</span></div>
        <div class="tagline">Test your math reflexes and swipe to victory!</div>

        <div class="card">
            <h3>Legal & Support Pages</h3>
            <div class="links-list">
                <a href="PrivacyPolicy.html" class="link-btn">Privacy Policy</a>
                <a href="Terms&Conditions.html" class="link-btn">Terms & Conditions</a>
                <a href="delete.html" class="link-btn delete">Account & Data Deletion</a>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 HzShkin / MathSwipe. All rights reserved.
    </footer>

</body>
</html>
